<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>World Cup 2026 Dashboard</title>

<style>
:root{
  --bg:#f5f8fc;
  --panel:#ffffff;
  --navy:#062a52;
  --navy2:#031f3f;
  --blue:#0b5ed7;
  --line:#e3e8f0;
  --text:#0f172a;
  --muted:#64748b;
  --green:#16a34a;
  --red:#ef4444;
  --gold:#f5b301;
  --soft:#f8fafc;
  --shadow:0 10px 30px rgba(15,23,42,.06);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.app{
  display:grid;
  grid-template-columns:220px 1fr;
  min-height:100vh;
}

.sidebar{
  background:linear-gradient(180deg,var(--navy),var(--navy2));
  color:#fff;
  padding:24px 16px;
  position:sticky;
  top:0;
  height:100vh;
}

.brand{
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:34px;
}

.trophy{
  font-size:42px;
  filter:drop-shadow(0 8px 18px rgba(245,179,1,.35));
}

.worldcup-trophy{
  width:58px;
  height:82px;
  object-fit:cover;
  object-position:center;
  border-radius:8px;
  filter:drop-shadow(0 10px 20px rgba(245,179,1,.28));
  background:rgba(255,255,255,.08);
}

.fallback-trophy{
  width:58px;
  height:82px;
  align-items:center;
  justify-content:center;
}

.brand-title{
  font-size:19px;
  font-weight:900;
  line-height:1.15;
  letter-spacing:.3px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.menu button{
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  border:0;
  border-radius:8px;
  background:transparent;
  color:#dbeafe;
  padding:13px 14px;
  font-weight:800;
  cursor:pointer;
  text-align:left;
}

.menu button:hover,
.menu button.active{
  background:#0b4c88;
  color:#fff;
}

.menu .ico{
  width:22px;
  text-align:center;
  font-size:18px;
}

.host{
  position:absolute;
  left:16px;
  right:16px;
  bottom:22px;
  display:flex;
  gap:10px;
  align-items:center;
  color:#e5eefb;
  font-size:12px;
  line-height:1.35;
}

.host-badge{
  width:34px;
  height:40px;
  background:#fff;
  color:#0b3264;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:11px;
}

.main{
  padding:28px 34px 40px;
}

.top{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:flex-start;
  margin-bottom:24px;
}

h1{
  margin:0;
  font-size:29px;
  color:#071f45;
  letter-spacing:-.4px;
}

.sub{
  margin-top:8px;
  color:var(--muted);
  font-size:15px;
}

.controls{
  display:flex;
  gap:14px;
  align-items:center;
  flex-wrap:wrap;
}

.search-box{
  position:relative;
}

.search-box input{
  width:320px;
  padding-right:42px;
}

.search-icon{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  color:#111827;
}

input,select,button{
  border:1px solid var(--line);
  background:#fff;
  border-radius:8px;
  color:#1e293b;
  padding:12px 14px;
  font-weight:700;
  outline:none;
  box-shadow:0 3px 10px rgba(15,23,42,.03);
}

button{
  cursor:pointer;
}

.primary{
  background:var(--navy);
  color:#fff;
  border-color:var(--navy);
}

.primary:hover{
  background:#041f3e;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:18px;
  margin-bottom:26px;
}

.kpi{
  background:#fff;
  border:1px solid var(--line);
  border-radius:9px;
  min-height:104px;
  padding:20px;
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  gap:16px;
  position:relative;
}

.kpi-icon{
  width:54px;
  height:54px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  background:#eef4ff;
}

.kpi b{
  font-size:28px;
  display:block;
  line-height:1;
}

.kpi span{
  display:block;
  margin-top:7px;
  color:var(--muted);
  font-size:14px;
}

.live-mini{
  position:absolute;
  top:16px;
  right:16px;
  border:2px solid var(--red);
  color:var(--red);
  font-size:11px;
  font-weight:900;
  padding:2px 5px;
  border-radius:4px;
}

.tabs{
  display:grid;
  grid-template-columns:repeat(8,minmax(110px,1fr));
  gap:14px;
  margin-bottom:20px;
}

.tab{
  background:#f0f3f8;
  border:0;
  color:#334155;
  border-radius:8px;
  padding:13px 14px;
  font-weight:800;
}

.tab.active{
  background:var(--navy);
  color:#fff;
}

.live-dot{
  width:8px;
  height:8px;
  background:var(--red);
  display:inline-block;
  border-radius:50%;
  margin-left:6px;
}

.live-label{
  display:inline-block;
  color:var(--red);
  border:1px solid var(--red);
  border-radius:4px;
  padding:1px 4px;
  font-size:10px;
  margin-left:5px;
}

.section{
  display:none;
}

.section.active{
  display:block;
}

.dashboard-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.panel{
  background:#fff;
  border:1px solid var(--line);
  border-radius:9px;
  box-shadow:var(--shadow);
  overflow:hidden;
}

.panel-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 22px;
  border-bottom:1px solid var(--line);
}

.panel-title{
  font-size:18px;
  font-weight:900;
  color:#0f1f3d;
}

.panel-link{
  color:#0b5ed7;
  font-size:14px;
  font-weight:800;
}

.table-wrap{
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:720px;
}

th,td{
  padding:14px 12px;
  border-bottom:1px solid var(--line);
  font-size:14px;
  text-align:left;
  white-space:nowrap;
}

th{
  background:#fbfcfe;
  color:#475569;
  font-weight:800;
}

td.center,th.center{
  text-align:center;
}

.team-cell{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:800;
}

.team-logo{
  width:30px;
  height:22px;
  object-fit:contain;
  border-radius:3px;
}

.rank-1,.rank-2{background:#effdf4}
.rank-3{background:#fff7df}
.qualify{background:#effdf4}
.eliminated{background:#fff1f1;opacity:.85}

.badge{
  display:inline-flex;
  min-width:24px;
  justify-content:center;
  padding:4px 7px;
  border-radius:5px;
  font-size:12px;
  font-weight:900;
}

.badge.green{background:#16a34a;color:#fff}
.badge.blue{background:#2563eb;color:#fff}
.badge.yellow{background:#f59e0b;color:#fff}
.badge.red{background:#ef4444;color:#fff}

.match-list{
  padding:12px 16px 18px;
}

.match{
  display:grid;
  grid-template-columns:90px 1fr auto 1fr;
  align-items:center;
  gap:18px;
  border:1px solid var(--line);
  border-radius:8px;
  padding:14px 16px;
  margin-bottom:10px;
  background:#fff;
}

.match-time{
  border-right:1px solid var(--line);
  color:#1f2937;
  text-align:center;
  font-weight:800;
  min-height:52px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.match-time .red{
  color:#dc2626;
  font-weight:900;
}

.side{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:800;
}

.side.away{
  justify-content:flex-end;
  text-align:right;
}

.logo{
  width:42px;
  height:30px;
  object-fit:contain;
  border-radius:4px;
  background:#fff;
}

.score{
  color:#0f1f3d;
  font-size:22px;
  min-width:78px;
  text-align:center;
  font-weight:900;
}

.score.live-score{
  color:#dc2626;
}

.meta{
  color:var(--muted);
  font-size:12px;
  margin-top:4px;
}

.live{
  background:#ef4444;
  color:#fff;
  border-radius:4px;
  padding:3px 6px;
  font-size:11px;
  font-weight:900;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:14px;
  padding:18px;
}

.card{
  border:1px solid var(--line);
  border-radius:8px;
  background:#fff;
  padding:16px;
  text-align:center;
}

.card .logo{
  width:50px;
  height:36px;
}

.team-name{
  margin-top:10px;
  font-weight:900;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-top:14px;
  color:#475569;
}

.stat b{
  display:block;
  color:#0f1f3d;
}

.stat span{
  font-size:11px;
}

.rule-box{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(290px,1fr));
  gap:14px;
  padding:18px;
}

.rule-item{
  border:1px solid var(--line);
  border-radius:8px;
  padding:16px;
  background:#fff;
  line-height:1.55;
}

.rule-item b{
  color:#071f45;
}

.empty{
  margin:18px;
  background:#fff;
  border:1px dashed var(--line);
  border-radius:8px;
  padding:28px;
  text-align:center;
  color:var(--muted);
}

.overview-bottom{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

.impressive{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  padding:18px;
}

.impressive .mini-card{
  border:1px solid var(--line);
  border-radius:8px;
  padding:15px 10px;
  text-align:center;
}

.impressive img{
  width:42px;
  height:30px;
  object-fit:contain;
}

.big-points{
  display:block;
  font-size:28px;
  font-weight:900;
  color:#0f1f3d;
  margin-top:10px;
}

.format{
  padding:24px;
  display:grid;
  grid-template-columns:1fr 240px;
  gap:20px;
  align-items:center;
}

.format ul{
  margin:0;
  padding:0;
  list-style:none;
}

.format li{
  display:flex;
  align-items:center;
  gap:12px;
  margin:16px 0;
  color:#334155;
  font-weight:600;
}

.bullet{
  width:34px;
  height:34px;
  border-radius:9px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#eff6ff;
}

.map{
  min-height:160px;
  border-radius:10px;
  background:
    radial-gradient(circle at 26% 45%, #2563eb 0 8%, transparent 9%),
    radial-gradient(circle at 34% 50%, #ef4444 0 7%, transparent 8%),
    radial-gradient(circle at 30% 60%, #22c55e 0 5%, transparent 6%),
    linear-gradient(135deg,#f2f5f9,#e5e9f0);
  opacity:.9;
}

.group-title{
  font-size:19px;
  color:#0f1f3d;
  font-weight:900;
  margin:22px 0 12px;
}

@media(max-width:1200px){
  .kpis{grid-template-columns:repeat(3,1fr)}
  .dashboard-grid,.overview-bottom{grid-template-columns:1fr}
  .tabs{grid-template-columns:repeat(4,1fr)}
}

@media(max-width:820px){
  .app{grid-template-columns:1fr}
  .sidebar{
    position:relative;
    height:auto;
  }
  .host{position:static;margin-top:20px}
  .main{padding:18px}
  .top{flex-direction:column}
  .controls,.search-box input,select,.primary{width:100%}
  .kpis{grid-template-columns:1fr}
  .tabs{grid-template-columns:1fr 1fr}
  .match{grid-template-columns:1fr}
  .match-time{border-right:0;border-bottom:1px solid var(--line)}
  .side.away{justify-content:flex-start;text-align:left}
  .format{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <img
        class="worldcup-trophy"
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/FIFA_World_Cup_Trophy_%28Jules_Rimet_Trophy%29.jpg/180px-FIFA_World_Cup_Trophy_%28Jules_Rimet_Trophy%29.jpg"
        alt="World Cup Trophy"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
      >
      <div class="trophy fallback-trophy" style="display:none">🏆</div>
      <div class="brand-title">WORLD<br>CUP<br>2026</div>
    </div>

    <nav class="menu">
      <button class="side-tab active" data-tab="overview" onclick="setTab('overview')"><span class="ico">⌂</span>Tổng quan</button>
      <button class="side-tab" data-tab="standings" onclick="setTab('standings')"><span class="ico">▥</span>Bảng xếp hạng</button>
      <button class="side-tab" data-tab="schedule" onclick="setTab('schedule')"><span class="ico">▦</span>Lịch thi đấu</button>
      <button class="side-tab" data-tab="history" onclick="setTab('history')"><span class="ico">♕</span>Kết quả</button>
      <button class="side-tab" data-tab="live" onclick="setTab('live')"><span class="ico">◉</span>Live Score <span class="live">LIVE</span></button>
      <button class="side-tab" data-tab="thirds" onclick="setTab('thirds')"><span class="ico">♛</span>Vòng đấu</button>
      <button class="side-tab" data-tab="teams" onclick="setTab('teams')"><span class="ico">⚽</span>Đội tuyển</button>
      <button class="side-tab" data-tab="rules" onclick="setTab('rules')"><span class="ico">▣</span>Thể thức</button>
    </nav>

    <div class="host">
      <div class="host-badge">WC</div>
      <div><b>USA • CANADA • MEXICO</b><br>11.06 - 19.07.2026</div>
    </div>
  </aside>

  <main class="main">
    <header class="top">
      <div>
        <h1>World Cup 2026 Dashboard</h1>
        <div class="sub">48 đội • BXH từng bảng • 12 đội hạng 3 • lịch thi đấu • kết quả • live score</div>
      </div>

      <div class="controls">
        <div class="search-box">
          <input id="search" placeholder="Tìm đội, bảng, trận..." oninput="render()" />
          <span class="search-icon">⌕</span>
        </div>
        <select id="groupFilter" onchange="render()">
          <option value="">Tất cả bảng</option>
        </select>
        <select id="teamFilter" onchange="render()">
          <option value="">Tất cả đội tuyển</option>
        </select>
        <button class="primary" onclick="refreshAll(true)">↻ Cập nhật ngay</button>
      </div>
    </header>

    <div class="kpis">
      <div class="kpi"><div class="kpi-icon">👥</div><div><b id="kpiTeams">48</b><span>Đội tham dự</span></div></div>
      <div class="kpi"><div class="kpi-icon">🥅</div><div><b id="kpiMatches">0</b><span>Trận đã tải</span></div></div>
      <div class="kpi"><div class="kpi-icon">✅</div><div><b id="kpiDone">0</b><span>Trận đã diễn ra</span></div></div>
      <div class="kpi"><span class="live-mini">LIVE</span><div class="kpi-icon">📡</div><div><b id="kpiLive">0</b><span>Đang diễn ra</span></div></div>
      <div class="kpi"><div class="kpi-icon">🏆</div><div><b>1</b><span>Đội vô địch</span></div></div>
      <div class="kpi"><div class="kpi-icon">🗓</div><div><b>11.06 - 19.07</b><span>Thời gian giải đấu</span></div></div>
    </div>

    <nav class="tabs">
      <button class="tab active" data-tab="standings" onclick="setTab('standings')">Bảng xếp hạng</button>
      <button class="tab" data-tab="schedule" onclick="setTab('schedule')">Lịch thi đấu</button>
      <button class="tab" data-tab="history" onclick="setTab('history')">Kết quả</button>
      <button class="tab" data-tab="live" onclick="setTab('live')">Live Score <span class="live-dot"></span><span class="live-label">LIVE</span></button>
      <button class="tab" data-tab="thirds" onclick="setTab('thirds')">Vòng đấu</button>
      <button class="tab" data-tab="teams" onclick="setTab('teams')">Đội tuyển</button>
      <button class="tab" data-tab="overview" onclick="setTab('overview')">Thống kê</button>
      <button class="tab" data-tab="rules" onclick="setTab('rules')">Thể thức</button>
    </nav>

    <section id="overview" class="section"></section>
    <section id="standings" class="section active"></section>
    <section id="thirds" class="section"></section>
    <section id="teams" class="section"></section>
    <section id="live" class="section"></section>
    <section id="schedule" class="section"></section>
    <section id="history" class="section"></section>
    <section id="rules" class="section"></section>
  </main>
</div>

<script>
const TEAMS = [
  ['A','Mexico','MEX','mex'],['A','South Africa','RSA','rsa'],['A','South Korea','KOR','kor'],['A','Czechia','CZE','cze'],
  ['B','Canada','CAN','can'],['B','Bosnia and Herzegovina','BIH','bih'],['B','Qatar','QAT','qat'],['B','Switzerland','SUI','sui'],
  ['C','Brazil','BRA','bra'],['C','Morocco','MAR','mar'],['C','Haiti','HTI','hti'],['C','Scotland','SCO','sco'],
  ['D','United States','USA','usa'],['D','Paraguay','PAR','par'],['D','Australia','AUS','aus'],['D','Turkey','TUR','tur'],
  ['E','Germany','GER','ger'],['E','Curacao','CUW','cuw'],['E','Ivory Coast','CIV','civ'],['E','Ecuador','ECU','ecu'],
  ['F','Netherlands','NED','ned'],['F','Japan','JPN','jpn'],['F','Sweden','SWE','swe'],['F','Tunisia','TUN','tun'],
  ['G','Belgium','BEL','bel'],['G','Egypt','EGY','egy'],['G','Iran','IRI','irn'],['G','New Zealand','NZL','nzl'],
  ['H','Spain','ESP','esp'],['H','Cape Verde','CPV','cpv'],['H','Saudi Arabia','KSA','ksa'],['H','Uruguay','URU','uru'],
  ['I','France','FRA','fra'],['I','Senegal','SEN','sen'],['I','Iraq','IRQ','irq'],['I','Norway','NOR','nor'],
  ['J','Argentina','ARG','arg'],['J','Algeria','DZA','alg'],['J','Austria','AUT','aut'],['J','Jordan','JOR','jor'],
  ['K','Portugal','POR','por'],['K','DR Congo','COD','cod'],['K','Uzbekistan','UZB','uzb'],['K','Colombia','COL','col'],
  ['L','England','ENG','eng'],['L','Croatia','CRO','cro'],['L','Ghana','GHA','gha'],['L','Panama','PAN','pan']
].map(([group,name,code,logo]) => ({
  group,
  name,
  code,
  logo:`https://a.espncdn.com/i/teamlogos/countries/500/${logo}.png`
}));

const teamByCode = Object.fromEntries(TEAMS.map(t => [t.code, t]));
let matches = [];
let activeTab = 'standings';

const $ = id => document.getElementById(id);

function fmtDate(d){
  return new Intl.DateTimeFormat('vi-VN',{dateStyle:'medium',timeStyle:'short'}).format(new Date(d));
}

function ymd(d){
  return d.toISOString().slice(0,10).replaceAll('-','');
}

function initFilters(){
  [...new Set(TEAMS.map(t => t.group))].forEach(g => {
    $('groupFilter').innerHTML += `<option value="${g}">Bảng ${g}</option>`;
  });
  TEAMS.forEach(t => {
    $('teamFilter').innerHTML += `<option value="${t.code}">${t.name}</option>`;
  });
}

function setTab(tab){
  activeTab = tab;

  document.querySelectorAll('.tab').forEach(x => {
    x.classList.toggle('active', x.dataset.tab === tab);
  });

  document.querySelectorAll('.side-tab').forEach(x => {
    x.classList.toggle('active', x.dataset.tab === tab);
  });

  document.querySelectorAll('.section').forEach(x => {
    x.classList.toggle('active', x.id === tab);
  });

  render();
}

async function fetchESPNByDate(dateYmd){
  const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/all/scoreboard?dates=${dateYmd}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('Không tải được dữ liệu ESPN');

  const data = await res.json();

  return (data.events || [])
    .filter(e => {
      const text = JSON.stringify(e).toLowerCase();
      return text.includes('world cup') || text.includes('fifa');
    })
    .map(parseESPNEvent);
}

function parseESPNEvent(e){
  const c = e.competitions?.[0] || {};
  const comps = c.competitors || [];

  const home = comps.find(x => x.homeAway === 'home') || comps[0] || {};
  const away = comps.find(x => x.homeAway === 'away') || comps[1] || {};
  const st = c.status || e.status || {};

  return {
    id:e.id,
    date:e.date || c.date,
    group:c.altGameNote || e.name || '',
    status:st.type?.state || 'pre',
    statusText:st.type?.shortDetail || st.type?.detail || st.type?.description || '',
    completed:!!st.type?.completed,
    displayClock:st.displayClock || '',
    home:{
      name:home.team?.displayName || home.team?.name || '',
      code:home.team?.abbreviation || '',
      logo:home.team?.logo || '',
      score:home.score ?? ''
    },
    away:{
      name:away.team?.displayName || away.team?.name || '',
      code:away.team?.abbreviation || '',
      logo:away.team?.logo || '',
      score:away.score ?? ''
    }
  };
}

async function refreshAll(manual=false){
  try{
    if(manual) toast('Đang cập nhật dữ liệu...');

    const start = new Date('2026-06-11T00:00:00');
    const end = new Date('2026-07-19T00:00:00');
    const today = new Date();
    const dates = [];

    for(let d = new Date(start); d <= end; d.setDate(d.getDate()+1)){
      const diff = Math.abs((d - today) / 86400000);
      if(manual || diff <= 5 || matches.length === 0) {
        dates.push(ymd(new Date(d)));
      }
    }

    const chunks = await Promise.allSettled(dates.map(fetchESPNByDate));
    const fresh = chunks.flatMap(x => x.status === 'fulfilled' ? x.value : []);

    const map = new Map(matches.map(m => [m.id, m]));
    fresh.forEach(m => { if(m.id) map.set(m.id, m); });

    matches = [...map.values()].sort((a,b) => new Date(a.date) - new Date(b.date));

    render();
    if(manual) toast('Đã cập nhật');
  }catch(e){
    console.error(e);
    toast('Không cập nhật được dữ liệu.');
    render();
  }
}

function sortStanding(a,b){
  return b.PTS - a.PTS ||
         b.GD - a.GD ||
         b.GF - a.GF ||
         a.name.localeCompare(b.name);
}

function getGroupStandings(){
  const result = {};

  TEAMS.forEach(t => {
    result[t.group] ||= [];
    result[t.group].push({...t,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,PTS:0});
  });

  const allTeams = Object.values(result).flat();

  matches.filter(m => m.completed).forEach(m => {
    const home = allTeams.find(t => t.code === m.home.code);
    const away = allTeams.find(t => t.code === m.away.code);
    if(!home || !away) return;

    const hs = Number(m.home.score);
    const as = Number(m.away.score);
    if(!Number.isFinite(hs) || !Number.isFinite(as)) return;

    home.P++; away.P++;
    home.GF += hs; home.GA += as;
    away.GF += as; away.GA += hs;

    if(hs > as){
      home.W++; away.L++; home.PTS += 3;
    }else if(hs < as){
      away.W++; home.L++; away.PTS += 3;
    }else{
      home.D++; away.D++; home.PTS++; away.PTS++;
    }

    home.GD = home.GF - home.GA;
    away.GD = away.GF - away.GA;
  });

  Object.keys(result).forEach(g => result[g].sort(sortStanding));
  return result;
}

function filteredTeams(){
  const q = $('search').value.toLowerCase().trim();
  const g = $('groupFilter').value;
  const tcode = $('teamFilter').value;

  return TEAMS.filter(t =>
    (!g || t.group === g) &&
    (!tcode || t.code === tcode) &&
    (!q || `${t.name} ${t.code} ${t.group}`.toLowerCase().includes(q))
  );
}

function filteredMatches(list){
  const q = $('search').value.toLowerCase().trim();
  const g = $('groupFilter').value;
  const tcode = $('teamFilter').value;

  return list.filter(m => {
    const h = teamByCode[m.home.code];
    const a = teamByCode[m.away.code];
    const text = `${m.home.name} ${m.away.name} ${m.home.code} ${m.away.code} ${m.group}`.toLowerCase();

    return (!q || text.includes(q)) &&
      (!g || h?.group === g || a?.group === g || m.group?.toLowerCase().includes(`group ${g.toLowerCase()}`)) &&
      (!tcode || m.home.code === tcode || m.away.code === tcode);
  });
}

function teamStats(code){
  return Object.values(getGroupStandings()).flat().find(t => t.code === code) || {
    P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,PTS:0
  };
}

function teamCell(t){
  return `
    <div class="team-cell">
      <img class="team-logo" src="${t.logo}" onerror="this.style.display='none'">
      <span>${t.name}</span>
    </div>
  `;
}

function panel(title, body, link='Xem tất cả →'){
  return `
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">${title}</div>
        <div class="panel-link">${link}</div>
      </div>
      ${body}
    </div>
  `;
}

function standingsTable(g, rows){
  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="center">#</th>
            <th>Đội tuyển</th>
            <th class="center">Tr</th>
            <th class="center">W</th>
            <th class="center">D</th>
            <th class="center">L</th>
            <th class="center">BT</th>
            <th class="center">BB</th>
            <th class="center">HS</th>
            <th class="center">Đ</th>
            <th class="center">Trạng thái</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map((t,i) => `
            <tr class="rank-${i+1}">
              <td class="center">${i+1}</td>
              <td>${teamCell(t)}</td>
              <td class="center">${t.P}</td>
              <td class="center">${t.W}</td>
              <td class="center">${t.D}</td>
              <td class="center">${t.L}</td>
              <td class="center">${t.GF}</td>
              <td class="center">${t.GA}</td>
              <td class="center">${t.GD > 0 ? '+'+t.GD : t.GD}</td>
              <td class="center"><b>${t.PTS}</b></td>
              <td class="center">
                ${
                  i === 0 ? '<span class="badge green">Q</span>' :
                  i === 1 ? '<span class="badge green">Q</span>' :
                  i === 2 ? '<span class="badge yellow">Q3</span>' :
                  '<span class="badge red">E</span>'
                }
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderStandings(){
  const standings = getGroupStandings();
  const groupFilter = $('groupFilter').value;

  $('standings').innerHTML = Object.keys(standings)
    .sort()
    .filter(g => !groupFilter || groupFilter === g)
    .map(g => panel(`Bảng ${g}`, standingsTable(g, standings[g]), ''))
    .join('');
}

function renderThirdPlaceRanking(){
  const standings = getGroupStandings();

  const thirds = Object.keys(standings)
    .map(g => ({...standings[g][2], group:g}))
    .sort(sortStanding);

  $('thirds').innerHTML = panel('Bảng xếp hạng 12 đội hạng 3', `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="center">#</th>
            <th>Đội tuyển</th>
            <th class="center">Bảng</th>
            <th class="center">Tr</th>
            <th class="center">W</th>
            <th class="center">D</th>
            <th class="center">L</th>
            <th class="center">BT</th>
            <th class="center">BB</th>
            <th class="center">HS</th>
            <th class="center">Đ</th>
            <th>Trạng thái</th>
          </tr>
        </thead>
        <tbody>
          ${thirds.map((t,i) => `
            <tr class="${i < 8 ? 'qualify' : 'eliminated'}">
              <td class="center">${i+1}</td>
              <td>${teamCell(t)}</td>
              <td class="center">${t.group}</td>
              <td class="center">${t.P}</td>
              <td class="center">${t.W}</td>
              <td class="center">${t.D}</td>
              <td class="center">${t.L}</td>
              <td class="center">${t.GF}</td>
              <td class="center">${t.GA}</td>
              <td class="center">${t.GD > 0 ? '+'+t.GD : t.GD}</td>
              <td class="center"><b>${t.PTS}</b></td>
              <td>${i < 8 ? '<span class="badge green">Vào vòng 1/32</span>' : '<span class="badge red">Bị loại</span>'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `,'8 đội hạng 3 tốt nhất →');
}

function renderTeams(){
  const groups = {};
  filteredTeams().forEach(t => {
    groups[t.group] ||= [];
    groups[t.group].push(t);
  });

  $('teams').innerHTML = Object.keys(groups).sort().map(g => panel(`Bảng ${g}`, `
    <div class="grid">
      ${groups[g].map(t => {
        const s = teamStats(t.code);
        return `
          <div class="card">
            <img class="logo" src="${t.logo}" onerror="this.style.display='none'">
            <div class="team-name">${t.name}</div>
            <div class="meta">Bảng ${t.group} • ${t.code}</div>
            <div class="stats">
              <div class="stat"><b>${s.P}</b><span>Tr</span></div>
              <div class="stat"><b>${s.W}</b><span>W</span></div>
              <div class="stat"><b>${s.D}</b><span>D</span></div>
              <div class="stat"><b>${s.L}</b><span>L</span></div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `,'')).join('') || `<div class="empty">Không tìm thấy đội phù hợp.</div>`;
}

function renderMatch(m){
  const isLive = m.status === 'in';
  const score = m.status === 'pre' ? 'VS' : `${m.home.score ?? 0} - ${m.away.score ?? 0}`;
  const timeText = isLive ? `${m.displayClock || m.statusText || 'LIVE'}` : (m.completed ? 'FT' : fmtDate(m.date));

  return `
    <div class="match">
      <div class="match-time">
        <div class="${isLive ? 'red' : ''}">${timeText}</div>
        ${isLive ? '<span class="live">LIVE</span>' : ''}
      </div>

      <div class="side">
        <img class="logo" src="${m.home.logo || teamByCode[m.home.code]?.logo || ''}" onerror="this.style.display='none'">
        <div>
          <b>${m.home.name}</b>
          <div class="meta">${m.home.code}</div>
        </div>
      </div>

      <div>
        <div class="score ${isLive ? 'live-score' : ''}">${score}</div>
        <div class="meta" style="text-align:center">${m.group || ''}</div>
      </div>

      <div class="side away">
        <div>
          <b>${m.away.name}</b>
          <div class="meta">${m.away.code}</div>
        </div>
        <img class="logo" src="${m.away.logo || teamByCode[m.away.code]?.logo || ''}" onerror="this.style.display='none'">
      </div>
    </div>
  `;
}

function renderMatchList(id, list, title){
  const ms = filteredMatches(list);
  $(id).innerHTML = panel(title, `
    <div class="match-list">
      ${ms.length ? ms.map(renderMatch).join('') : `<div class="empty">Chưa có dữ liệu phù hợp.</div>`}
    </div>
  `,'');
}

function renderRules(){
  $('rules').innerHTML = panel('Thể thức World Cup 2026', `
    <div class="rule-box">
      <div class="rule-item"><b>1. Điểm số</b><br>Thắng 3 điểm, hòa 1 điểm, thua 0 điểm.</div>
      <div class="rule-item"><b>2. Hiệu số bàn thắng bại</b><br>Nếu bằng điểm, ưu tiên đội có hiệu số tốt hơn.</div>
      <div class="rule-item"><b>3. Tổng số bàn thắng</b><br>Nếu hiệu số bằng nhau, ưu tiên đội ghi nhiều bàn hơn.</div>
      <div class="rule-item"><b>4. Đối đầu trực tiếp</b><br>Khi nhiều đội bằng nhau, xét kết quả đối đầu giữa các đội liên quan.</div>
      <div class="rule-item"><b>5. Fair-play</b><br>Nếu vẫn bằng nhau, xét điểm fair-play dựa trên số thẻ phạt.</div>
      <div class="rule-item"><b>6. Bốc thăm</b><br>Nếu vẫn bằng nhau, FIFA có thể xác định bằng bốc thăm.</div>
      <div class="rule-item"><b>Cách vào vòng 1/32</b><br>12 đội nhất bảng, 12 đội nhì bảng và 8 đội hạng ba tốt nhất sẽ đi tiếp.</div>
      <div class="rule-item"><b>12 đội hạng 3</b><br>Được xếp chung theo điểm, hiệu số, bàn thắng để chọn 8 đội tốt nhất.</div>
    </div>
  `,'Xem chi tiết →');
}

function renderOverview(){
  const standings = getGroupStandings();
  const firstGroup = $('groupFilter').value || 'A';
  const groupRows = standings[firstGroup] || standings.A;
  const liveOrNext = matches.filter(m => m.status === 'in' || !m.completed).slice(0,3);

  const topTeams = Object.values(standings).flat().sort(sortStanding).slice(0,5);

  $('overview').innerHTML = `
    <div class="dashboard-grid">
      ${panel(`Bảng ${firstGroup}`, standingsTable(firstGroup, groupRows), 'Xem chi tiết bảng →')}
      ${panel('Trận đấu đang diễn ra / Sắp diễn ra', `
        <div class="match-list">
          ${liveOrNext.length ? liveOrNext.map(renderMatch).join('') : '<div class="empty">Chưa có dữ liệu trận đấu.</div>'}
        </div>
      `,'Xem tất cả →')}
    </div>

    <div class="overview-bottom">
      ${panel('Top đội thi đấu ấn tượng', `
        <div class="impressive">
          ${topTeams.map(t => `
            <div class="mini-card">
              <img src="${t.logo}" onerror="this.style.display='none'">
              <div class="team-name">${t.name}</div>
              <span class="big-points">${t.PTS}</span>
              <div class="meta">Điểm</div>
              <div class="stats">
                <div><b>${t.P}</b><span>Tr</span></div>
                <div><b>${t.W}</b><span>W</span></div>
                <div><b>${t.D}</b><span>D</span></div>
                <div><b>${t.L}</b><span>L</span></div>
              </div>
            </div>
          `).join('')}
        </div>
      `,'Xem tất cả →')}

      ${panel('Thể thức World Cup 2026', `
        <div class="format">
          <ul>
            <li><span class="bullet">👥</span>48 đội chia thành 12 bảng, mỗi bảng 4 đội.</li>
            <li><span class="bullet">✅</span>2 đội đứng đầu mỗi bảng giành quyền vào vòng 1/32.</li>
            <li><span class="bullet">🟠</span>8 đội hạng 3 có thành tích tốt nhất cũng giành quyền đi tiếp.</li>
            <li><span class="bullet">🏆</span>Tổng cộng 32 đội vào vòng loại trực tiếp.</li>
          </ul>
          <div class="map"></div>
        </div>
      `,'Xem chi tiết →')}
    </div>
  `;
}

function render(){
  $('kpiTeams').textContent = TEAMS.length;
  $('kpiMatches').textContent = matches.length || 210;
  $('kpiDone').textContent = matches.filter(m => m.completed).length;
  $('kpiLive').textContent = matches.filter(m => m.status === 'in').length;

  renderOverview();
  renderStandings();
  renderThirdPlaceRanking();
  renderTeams();

  const today = new Date().toISOString().slice(0,10);

  renderMatchList('live', matches.filter(m =>
    m.status === 'in' || new Date(m.date).toISOString().slice(0,10) === today
  ), 'Trận đấu đang diễn ra / Hôm nay');

  renderMatchList('schedule', matches.filter(m => !m.completed), 'Lịch thi đấu');
  renderMatchList('history', matches.filter(m => m.completed).reverse(), 'Lịch sử kết quả');

  renderRules();
}

function toast(msg){
  let t = document.getElementById('toast');

  if(!t){
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      background:#071f45;
      color:#fff;
      padding:11px 16px;
      border-radius:999px;
      font-weight:800;
      box-shadow:0 20px 60px rgba(0,0,0,.25);
      z-index:9999;
    `;
    document.body.appendChild(t);
  }

  t.textContent = msg;
  t.style.display = 'block';

  clearTimeout(window.__toast);
  window.__toast = setTimeout(() => t.style.display = 'none', 2300);
}

initFilters();
render();
refreshAll(true);
setInterval(() => refreshAll(false), 30000);
</script>
