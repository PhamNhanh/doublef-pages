<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>World Cup 2026 Dashboard</title>

<style>
:root{
  --bg:#f5f8fc;
  --panel:#ffffff;
  --navy:#062a52;
  --navy2:#031f3f;
  --blue:#0b5ed7;
  --line:#e3e8f0;
  --text:#0f172a;
  --muted:#64748b;
  --green:#16a34a;
  --red:#ef4444;
  --gold:#f5b301;
  --soft:#f8fafc;
  --shadow:0 10px 30px rgba(15,23,42,.06);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.app{
  display:grid;
  grid-template-columns:220px 1fr;
  min-height:100vh;
}

.sidebar{
  background:linear-gradient(180deg,var(--navy),var(--navy2));
  color:#fff;
  padding:24px 16px;
  position:sticky;
  top:0;
  height:100vh;
}

.brand{
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:34px;
}

.trophy{
  font-size:42px;
  filter:drop-shadow(0 8px 18px rgba(245,179,1,.35));
}

.worldcup-trophy{
  width:58px;
  height:82px;
  object-fit:cover;
  object-position:center;
  border-radius:8px;
  filter:drop-shadow(0 10px 20px rgba(245,179,1,.28));
  background:rgba(255,255,255,.08);
}

.fallback-trophy{
  width:58px;
  height:82px;
  align-items:center;
  justify-content:center;
}

.brand-title{
  font-size:19px;
  font-weight:900;
  line-height:1.15;
  letter-spacing:.3px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.menu button{
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  border:0;
  border-radius:8px;
  background:transparent;
  color:#dbeafe;
  padding:13px 14px;
  font-weight:800;
  cursor:pointer;
  text-align:left;
}

.menu button:hover,
.menu button.active{
  background:#0b4c88;
  color:#fff;
}

.menu .ico{
  width:22px;
  text-align:center;
  font-size:18px;
}

.host{
  position:absolute;
  left:16px;
  right:16px;
  bottom:22px;
  display:flex;
  gap:10px;
  align-items:center;
  color:#e5eefb;
  font-size:12px;
  line-height:1.35;
}

.host-badge{
  width:34px;
  height:40px;
  background:#fff;
  color:#0b3264;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:11px;
}

.main{
  padding:28px 34px 40px;
}

.top{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:flex-start;
  margin-bottom:24px;
}

h1{
  margin:0;
  font-size:29px;
  color:#071f45;
  letter-spacing:-.4px;
}

.sub{
  margin-top:8px;
  color:var(--muted);
  font-size:15px;
}

.controls{
  display:flex;
  gap:14px;
  align-items:center;
  flex-wrap:wrap;
}

.search-box{
  position:relative;
}

.search-box input{
  width:320px;
  padding-right:42px;
}

.search-icon{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  color:#111827;
}

input,select,button{
  border:1px solid var(--line);
  background:#fff;
  border-radius:8px;
  color:#1e293b;
  padding:12px 14px;
  font-weight:700;
  outline:none;
  box-shadow:0 3px 10px rgba(15,23,42,.03);
}

button{
  cursor:pointer;
}

.primary{
  background:var(--navy);
  color:#fff;
  border-color:var(--navy);
}

.primary:hover{
  background:#041f3e;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:18px;
  margin-bottom:26px;
}

.kpi{
  background:#fff;
  border:1px solid var(--line);
  border-radius:9px;
  min-height:104px;
  padding:20px;
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  gap:16px;
  position:relative;
}

.kpi-icon{
  width:54px;
  height:54px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  background:#eef4ff;
}

.kpi b{
  font-size:28px;
  display:block;
  line-height:1;
}

.kpi span{
  display:block;
  margin-top:7px;
  color:var(--muted);
  font-size:14px;
}

.live-mini{
  position:absolute;
  top:16px;
  right:16px;
  border:2px solid var(--red);
  color:var(--red);
  font-size:11px;
  font-weight:900;
  padding:2px 5px;
  border-radius:4px;
}

.tabs{
  display:grid;
  grid-template-columns:repeat(8,minmax(110px,1fr));
  gap:14px;
  margin-bottom:20px;
}

.tab{
  background:#f0f3f8;
  border:0;
  color:#334155;
  border-radius:8px;
  padding:13px 14px;
  font-weight:800;
}

.tab.active{
  background:var(--navy);
  color:#fff;
}

.live-dot{
  width:8px;
  height:8px;
  background:var(--red);
  display:inline-block;
  border-radius:50%;
  margin-left:6px;
}

.live-label{
  display:inline-block;
  color:var(--red);
  border:1px solid var(--red);
  border-radius:4px;
  padding:1px 4px;
  font-size:10px;
  margin-left:5px;
}

.section{
  display:none;
}

.section.active{
  display:block;
}

.dashboard-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.panel{
  background:#fff;
  border:1px solid var(--line);
  border-radius:9px;
  box-shadow:var(--shadow);
  overflow:hidden;
}

.panel-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 22px;
  border-bottom:1px solid var(--line);
}

.panel-title{
  font-size:18px;
  font-weight:900;
  color:#0f1f3d;
}

.panel-link{
  color:#0b5ed7;
  font-size:14px;
  font-weight:800;
}

.table-wrap{
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:720px;
}

th,td{
  padding:14px 12px;
  border-bottom:1px solid var(--line);
  font-size:14px;
  text-align:left;
  white-space:nowrap;
}

th{
  background:#fbfcfe;
  color:#475569;
  font-weight:800;
}

td.center,th.center{
  text-align:center;
}

.team-cell{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:800;
}

.team-logo{
  width:30px;
  height:22px;
  object-fit:contain;
  border-radius:3px;
}

.rank-1,.rank-2{background:#effdf4}
.rank-3{background:#fff7df}
.qualify{background:#effdf4}
.eliminated{background:#fff1f1;opacity:.85}

.badge{
  display:inline-flex;
  min-width:24px;
  justify-content:center;
  padding:4px 7px;
  border-radius:5px;
  font-size:12px;
  font-weight:900;
}

.badge.green{background:#16a34a;color:#fff}
.badge.blue{background:#2563eb;color:#fff}
.badge.yellow{background:#f59e0b;color:#fff}
.badge.red{background:#ef4444;color:#fff}

.match-list{
  padding:12px 16px 18px;
}

.match{
  display:grid;
  grid-template-columns:90px 1fr auto 1fr;
  align-items:center;
  gap:18px;
  border:1px solid var(--line);
  border-radius:8px;
  padding:14px 16px;
  margin-bottom:10px;
  background:#fff;
}

.match-time{
  border-right:1px solid var(--line);
  color:#1f2937;
  text-align:center;
  font-weight:800;
  min-height:52px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.match-time .red{
  color:#dc2626;
  font-weight:900;
}

.side{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:800;
}

.side.away{
  justify-content:flex-end;
  text-align:right;
}

.logo{
  width:42px;
  height:30px;
  object-fit:contain;
  border-radius:4px;
  background:#fff;
}

.score{
  color:#0f1f3d;
  font-size:22px;
  min-width:78px;
  text-align:center;
  font-weight:900;
}

.score.live-score{
  color:#dc2626;
}

.meta{
  color:var(--muted);
  font-size:12px;
  margin-top:4px;
}

.live{
  background:#ef4444;
  color:#fff;
  border-radius:4px;
  padding:3px 6px;
  font-size:11px;
  font-weight:900;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:14px;
  padding:18px;
}

.card{
  border:1px solid var(--line);
  border-radius:8px;
  background:#fff;
  padding:16px;
  text-align:center;
}

.card .logo{
  width:50px;
  height:36px;
}

.team-name{
  margin-top:10px;
  font-weight:900;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-top:14px;
  color:#475569;
}

.stat b{
  display:block;
  color:#0f1f3d;
}

.stat span{
  font-size:11px;
}

.rule-box{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(290px,1fr));
  gap:14px;
  padding:18px;
}

.rule-item{
  border:1px solid var(--line);
  border-radius:8px;
  padding:16px;
  background:#fff;
  line-height:1.55;
}

.rule-item b{
  color:#071f45;
}

.empty{
  margin:18px;
  background:#fff;
  border:1px dashed var(--line);
  border-radius:8px;
  padding:28px;
  text-align:center;
  color:var(--muted);
}

.overview-bottom{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

.impressive{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  padding:18px;
}

.impressive .mini-card{
  border:1px solid var(--line);
  border-radius:8px;
  padding:15px 10px;
  text-align:center;
}

.impressive img{
  width:42px;
  height:30px;
  object-fit:contain;
}

.big-points{
  display:block;
  font-size:28px;
  font-weight:900;
  color:#0f1f3d;
  margin-top:10px;
}

.format{
  padding:24px;
  display:grid;
  grid-template-columns:1fr 240px;
  gap:20px;
  align-items:center;
}

.format ul{
  margin:0;
  padding:0;
  list-style:none;
}

.format li{
  display:flex;
  align-items:center;
  gap:12px;
  margin:16px 0;
  color:#334155;
  font-weight:600;
}

.bullet{
  width:34px;
  height:34px;
  border-radius:9px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#eff6ff;
}

.map{
  min-height:160px;
  border-radius:10px;
  background:
    radial-gradient(circle at 26% 45%, #2563eb 0 8%, transparent 9%),
    radial-gradient(circle at 34% 50%, #ef4444 0 7%, transparent 8%),
    radial-gradient(circle at 30% 60%, #22c55e 0 5%, transparent 6%),
    linear-gradient(135deg,#f2f5f9,#e5e9f0);
  opacity:.9;
}

.group-title{
  font-size:19px;
  color:#0f1f3d;
  font-weight:900;
  margin:22px 0 12px;
}


.knockout-grid{
  padding:18px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:14px;
}

.ko-card{
  border:1px solid var(--line);
  border-radius:9px;
  background:#fff;
  overflow:hidden;
}

.ko-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  background:#f8fafc;
  border-bottom:1px solid var(--line);
  padding:12px 14px;
  font-weight:900;
  color:#071f45;
}

.ko-seed{
  font-size:11px;
  border-radius:999px;
  padding:4px 8px;
  background:#eaf2ff;
  color:#0b5ed7;
  font-weight:900;
}

.ko-body{
  padding:12px 14px;
}

.ko-team{
  display:flex;
  align-items:center;
  gap:10px;
  min-height:38px;
  font-weight:800;
}

.ko-team + .ko-team{
  border-top:1px dashed var(--line);
  margin-top:8px;
  padding-top:8px;
}

.ko-team img{
  width:30px;
  height:22px;
  object-fit:contain;
}

.ko-vs{
  text-align:center;
  color:var(--muted);
  font-size:12px;
  font-weight:900;
  margin:4px 0;
}

.bracket-note{
  padding:0 18px 18px;
  color:#475569;
  line-height:1.6;
}

.bracket-note b{
  color:#071f45;
}

.seed-table{
  padding:18px;
}

@media(max-width:1200px){
  .kpis{grid-template-columns:repeat(3,1fr)}
  .dashboard-grid,.overview-bottom{grid-template-columns:1fr}
  .tabs{grid-template-columns:repeat(4,1fr)}
}

@media(max-width:820px){
  .app{grid-template-columns:1fr}
  .sidebar{
    position:relative;
    height:auto;
  }
  .host{position:static;margin-top:20px}
  .main{padding:18px}
  .top{flex-direction:column}
  .controls,.search-box input,select,.primary{width:100%}
  .kpis{grid-template-columns:1fr}
  .tabs{grid-template-columns:1fr 1fr}
  .match{grid-template-columns:1fr}
  .match-time{border-right:0;border-bottom:1px solid var(--line)}
  .side.away{justify-content:flex-start;text-align:left}
  .format{grid-template-columns:1fr}
}


/* ===== PREMIUM FIFA RANKING / ANALYTICS UPGRADE ===== */
.source-chip{
  display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:900;color:#334155;
}
.source-chip a{color:#0b5ed7;text-decoration:none}
.rank-toolbar{
  display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;padding:18px;border-bottom:1px solid var(--line);background:#fbfcfe;
}
.rank-toolbar textarea{
  min-width:360px;min-height:74px;resize:vertical;border:1px solid var(--line);border-radius:8px;padding:12px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;font-weight:700;color:#0f172a;background:#fff;
}
.premium-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;padding:18px}
.premium-card{border:1px solid var(--line);border-radius:10px;background:#fff;padding:16px;box-shadow:0 8px 24px rgba(15,23,42,.04)}
.premium-card .label{color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.4px}
.premium-card .value{font-size:26px;font-weight:950;color:#071f45;margin-top:8px}
.tier{display:inline-flex;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:950;color:#fff}
.tier.s{background:#7c3aed}.tier.a{background:#2563eb}.tier.b{background:#16a34a}.tier.c{background:#f59e0b}.tier.d{background:#64748b}
.powerbar{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;min-width:110px}
.powerbar span{display:block;height:100%;background:linear-gradient(90deg,#0b5ed7,#16a34a);border-radius:999px}
.compare-box{display:grid;grid-template-columns:1fr 80px 1fr;gap:14px;align-items:center;padding:18px}
.compare-team{border:1px solid var(--line);border-radius:10px;background:#fff;padding:16px;text-align:center}
.compare-team img{width:58px;height:42px;object-fit:contain}
.compare-score{font-size:28px;font-weight:950;color:#071f45;text-align:center}
.copy-note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:8px}

</style>
</head>

<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <img
        class="worldcup-trophy"
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/FIFA_World_Cup_Trophy_%28Jules_Rimet_Trophy%29.jpg/180px-FIFA_World_Cup_Trophy_%28Jules_Rimet_Trophy%29.jpg"
        alt="World Cup Trophy"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
      >
      <div class="trophy fallback-trophy" style="display:none">🏆</div>
      <div class="brand-title">WORLD<br>CUP<br>2026</div>
    </div>

    <nav class="menu">
      <button class="side-tab active" data-tab="overview" onclick="setTab('overview')"><span class="ico">⌂</span>Tổng quan</button>
      <button class="side-tab" data-tab="standings" onclick="setTab('standings')"><span class="ico">▥</span>Bảng xếp hạng</button>
      <button class="side-tab" data-tab="schedule" onclick="setTab('schedule')"><span class="ico">▦</span>Lịch thi đấu</button>
      <button class="side-tab" data-tab="history" onclick="setTab('history')"><span class="ico">♕</span>Kết quả</button>
      <button class="side-tab" data-tab="live" onclick="setTab('live')"><span class="ico">◉</span>Live Score <span class="live">LIVE</span></button>
      <button class="side-tab" data-tab="thirds" onclick="setTab('thirds')"><span class="ico">♛</span>Vòng đấu</button>
      <button class="side-tab" data-tab="ranking" onclick="setTab('ranking')"><span class="ico">★</span>FIFA Ranking</button>
      <button class="side-tab" data-tab="teams" onclick="setTab('teams')"><span class="ico">⚽</span>Đội tuyển</button>
      <button class="side-tab" data-tab="rules" onclick="setTab('rules')"><span class="ico">▣</span>Thể thức</button>
    </nav>

    <div class="host">
      <div class="host-badge">WC</div>
      <div><b>USA • CANADA • MEXICO</b><br>11.06 - 19.07.2026</div>
    </div>
  </aside>

  <main class="main">
    <header class="top">
      <div>
        <h1>World Cup 2026 Dashboard</h1>
        <div class="sub">48 đội • BXH từng bảng • FIFA Ranking • mô phỏng hạt giống • knock-out • live score</div>
      </div>

      <div class="controls">
        <div class="search-box">
          <input id="search" placeholder="Tìm đội, bảng, trận..." oninput="render()" />
          <span class="search-icon">⌕</span>
        </div>
        <select id="groupFilter" onchange="render()">
          <option value="">Tất cả bảng</option>
        </select>
        <select id="teamFilter" onchange="render()">
          <option value="">Tất cả đội tuyển</option>
        </select>
        <button class="primary" onclick="refreshAll(true)">↻ Cập nhật ngay</button>
      </div>
    </header>

    <div class="kpis">
      <div class="kpi"><div class="kpi-icon">👥</div><div><b id="kpiTeams">48</b><span>Đội tham dự</span></div></div>
      <div class="kpi"><div class="kpi-icon">🥅</div><div><b id="kpiMatches">0</b><span>Trận đã tải</span></div></div>
      <div class="kpi"><div class="kpi-icon">✅</div><div><b id="kpiDone">0</b><span>Trận đã diễn ra</span></div></div>
      <div class="kpi"><span class="live-mini">LIVE</span><div class="kpi-icon">📡</div><div><b id="kpiLive">0</b><span>Đang diễn ra</span></div></div>
      <div class="kpi"><div class="kpi-icon">🏆</div><div><b>1</b><span>Đội vô địch</span></div></div>
      <div class="kpi"><div class="kpi-icon">🗓</div><div><b>11.06 - 19.07</b><span>Thời gian giải đấu</span></div></div>
    </div>

    <nav class="tabs">
      <button class="tab active" data-tab="standings" onclick="setTab('standings')">Bảng xếp hạng</button>
      <button class="tab" data-tab="schedule" onclick="setTab('schedule')">Lịch thi đấu</button>
      <button class="tab" data-tab="history" onclick="setTab('history')">Kết quả</button>
      <button class="tab" data-tab="live" onclick="setTab('live')">Live Score <span class="live-dot"></span><span class="live-label">LIVE</span></button>
      <button class="tab" data-tab="thirds" onclick="setTab('thirds')">Vòng đấu</button>
      <button class="tab" data-tab="ranking" onclick="setTab('ranking')">FIFA Ranking</button>
      <button class="tab" data-tab="teams" onclick="setTab('teams')">Đội tuyển</button>
      <button class="tab" data-tab="overview" onclick="setTab('overview')">Thống kê</button>
      <button class="tab" data-tab="rules" onclick="setTab('rules')">Thể thức</button>
    </nav>

    <section id="overview" class="section"></section>
    <section id="standings" class="section active"></section>
    <section id="thirds" class="section"></section>
    <section id="teams" class="section"></section>

async function fetchESPNByDate(dateYmd){
  const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/all/scoreboard?dates=${dateYmd}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('Không tải được dữ liệu ESPN');

  const data = await res.json();

  return (data.events || [])
    .filter(e => {
      const text = JSON.stringify(e).toLowerCase();
      return text.includes('world cup') || text.includes('fifa');
    })
    .map(parseESPNEvent);
}

function parseESPNEvent(e){
  const c = e.competitions?.[0] || {};
  const comps = c.competitors || [];

  const home = comps.find(x => x.homeAway === 'home') || comps[0] || {};
  const away = comps.find(x => x.homeAway === 'away') || comps[1] || {};
  const st = c.status || e.status || {};

  return {
    id:e.id,
    date:e.date || c.date,
    group:c.altGameNote || e.name || '',
    status:st.type?.state || 'pre',
    statusText:st.type?.shortDetail || st.type?.detail || st.type?.description || '',
    completed:!!st.type?.completed,
    displayClock:st.displayClock || '',
    home:{
      name:home.team?.displayName || home.team?.name || '',
      code:home.team?.abbreviation || '',
      logo:home.team?.logo || '',
      score:home.score ?? ''
    },
    away:{
      name:away.team?.displayName || away.team?.name || '',
      code:away.team?.abbreviation || '',
      logo:away.team?.logo || '',
      score:away.score ?? ''
    }
  };
}

async function refreshAll(manual=false){
  try{
    if(manual) toast('Đang cập nhật dữ liệu...');

    const start = new Date('2026-06-11T00:00:00');
    const end = new Date('2026-07-19T00:00:00');
    const today = new Date();
    const dates = [];

    for(let d = new Date(start); d <= end; d.setDate(d.getDate()+1)){
      const diff = Math.abs((d - today) / 86400000);
      if(manual || diff <= 5 || matches.length === 0) {
        dates.push(ymd(new Date(d)));
      }
    }

    const chunks = await Promise.allSettled(dates.map(fetchESPNByDate));
    const fresh = chunks.flatMap(x => x.status === 'fulfilled' ? x.value : []);

    const map = new Map(matches.map(m => [m.id, m]));
    fresh.forEach(m => { if(m.id) map.set(m.id, m); });

    matches = [...map.values()].sort((a,b) => new Date(a.date) - new Date(b.date));

    render();
    if(manual) toast('Đã cập nhật');
  }catch(e){
    console.error(e);
    toast('Không cập nhật được dữ liệu.');
    render();
  }
}

function sortStanding(a,b){
  return b.PTS - a.PTS ||
         b.GD - a.GD ||
         b.GF - a.GF ||
         a.name.localeCompare(b.name);
}

function getGroupStandings(){
  const result = {};

  TEAMS.forEach(t => {
    result[t.group] ||= [];
    result[t.group].push({...t,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,PTS:0});
  });

  const allTeams = Object.values(result).flat();

  matches.filter(m => m.completed).forEach(m => {
    const home = allTeams.find(t => t.code === m.home.code);
    const away = allTeams.find(t => t.code === m.away.code);
    if(!home || !away) return;

    const hs = Number(m.home.score);
    const as = Number(m.away.score);
    if(!Number.isFinite(hs) || !Number.isFinite(as)) return;

    home.P++; away.P++;
    home.GF += hs; home.GA += as;
    away.GF += as; away.GA += hs;

    if(hs > as){
      home.W++; away.L++; home.PTS += 3;
    }else if(hs < as){
      away.W++; home.L++; away.PTS += 3;
    }else{
      home.D++; away.D++; home.PTS++; away.PTS++;
    }

    home.GD = home.GF - home.GA;
    away.GD = away.GF - away.GA;
  });

  Object.keys(result).forEach(g => result[g].sort(sortStanding));
  return result;
}

function getQualifiedTeams(){
  const standings = getGroupStandings();
  const groupKeys = Object.keys(standings).sort();

  const winners = groupKeys.map(g => ({...standings[g][0], group:g, qualifyType:'Nhất bảng'}));
  const runners = groupKeys.map(g => ({...standings[g][1], group:g, qualifyType:'Nhì bảng'}));
  const thirds = groupKeys
    .map(g => ({...standings[g][2], group:g, qualifyType:'Hạng 3'}))
    .sort(sortStanding);

  const bestThirds = thirds.slice(0,8);

  const topSeeds = [...winners]
    .sort((a,b) => (FIFA_RANKING[a.code] || 999) - (FIFA_RANKING[b.code] || 999))
    .slice(0,4)
    .map((t,i) => ({...t, seed:i+1}));

  const normalWinners = winners.filter(t => !topSeeds.some(s => s.code === t.code));

  return { standings, winners, runners, thirds, bestThirds, topSeeds, normalWinners };
}

function pickByGroup(list, group){

/*
  Mô phỏng chia cặp vòng 1/32 theo nguyên tắc người dùng cung cấp:
  - 32 đội: 12 nhất bảng, 12 nhì bảng, 8 đội hạng 3 tốt nhất.
  - 4 đội nhất bảng có FIFA ranking cao nhất được tách vào 4 nhánh khác nhau.
  - Ưu tiên tránh đội cùng bảng gặp lại ngay vòng 1/32.
  - Các cặp còn lại ghép theo mô hình cố định, có nhóm nhì bảng gặp nhì bảng và nhất bảng gặp hạng 3.
*/
function buildRoundOf32Pairings(){
  const q = getQualifiedTeams();
  const topSeeds = q.topSeeds;
  const bestThirds = [...q.bestThirds];
  const normalWinners = [...q.normalWinners].sort((a,b) => a.group.localeCompare(b.group));
  const runners = [...q.runners].sort((a,b) => a.group.localeCompare(b.group));

  const pairings = [];

  // 4 nhánh bảo vệ hạt giống hàng đầu
  topSeeds.forEach((seedTeam, index) => {
    let opponentIndex = bestThirds.findIndex(t => t.group !== seedTeam.group);
    if(opponentIndex < 0) opponentIndex = 0;
    const opponent = bestThirds.splice(opponentIndex,1)[0];

    pairings.push({
      title:`Nhánh hạt giống ${index + 1}`,
      label:`Seed ${seedTeam.seed}`,
      rule:'Đội hạt giống hàng đầu gặp đội hạng 3 tốt nhất khác bảng',
      home:seedTeam,
      away:opponent
    });
  });

  // 4 cặp nhì bảng liền kề: A-B, C-D, E-F, G-H
  const runnerPairs = [['A','B'],['C','D'],['E','F'],['G','H']];
  runnerPairs.forEach(([g1,g2]) => {
    const t1 = pickByGroup(runners,g1);
    const t2 = pickByGroup(runners,g2);
    if(t1 && t2){
      pairings.push({
        title:`Nhì bảng ${g1} vs Nhì bảng ${g2}`,
        label:'R2-R2',
        rule:'Cặp nhì bảng theo bảng liền kề',
        home:t1,
        away:t2
      });
    }
  });

  // 4 đội nhất bảng còn lại gặp 4 đội hạng 3 còn lại
  while(pairings.length < 12 && normalWinners.length && bestThirds.length){
    const winner = normalWinners.shift();
    let opponentIndex = bestThirds.findIndex(t => t.group !== winner.group);
    if(opponentIndex < 0) opponentIndex = 0;
    const opponent = bestThirds.splice(opponentIndex,1)[0];

    pairings.push({
      title:`Nhất bảng ${winner.group} vs Hạng 3`,
      label:'W-3rd',
      rule:'Đội nhất bảng gặp đội hạng 3 khác bảng',
      home:winner,
      away:opponent
    });
  }

  // Các cặp còn lại: nhì bảng từ các bảng khác
  const usedCodes = new Set(pairings.flatMap(p => [p.home?.code, p.away?.code]).filter(Boolean));
  const remainingRunners = runners.filter(t => !usedCodes.has(t.code));
  const remainingWinners = normalWinners.filter(t => !usedCodes.has(t.code));

  while(pairings.length < 16){
    let home = remainingRunners.shift() || remainingWinners.shift() || null;
    let pool = [...remainingRunners, ...remainingWinners];
    if(!home || !pool.length) break;

    let idx = pool.findIndex(t => t.group !== home.group);
    if(idx < 0) idx = 0;

    const away = pool[idx];

    const rr = remainingRunners.findIndex(t => t.code === away.code);
    const rw = remainingWinners.findIndex(t => t.code === away.code);
    if(rr >= 0) remainingRunners.splice(rr,1);
    if(rw >= 0) remainingWinners.splice(rw,1);

    pairings.push({
      title:`Cặp đấu ${pairings.length + 1}`,
      label:'Khác bảng',
      rule:'Ghép đội còn lại, ưu tiên khác bảng',
      home,
      away
    });
  }

  return { ...q, pairings };
}

function rankOf(code){
  return Number(FIFA_RANKING[code] || 999);
}

function rankTier(rank){
  if(rank <= 8) return {cls:'s', label:'S - Siêu hạt giống'};
  if(rank <= 16) return {cls:'a', label:'A - Ứng viên mạnh'};
  if(rank <= 24) return {cls:'b', label:'B - Cạnh tranh'};
  if(rank <= 36) return {cls:'c', label:'C - Khó chịu'};
  return {cls:'d', label:'D - Ẩn số'};
}

function powerIndex(team){
  const s = teamStats(team.code);
  const rankScore = Math.max(0, 100 - (rankOf(team.code) - 1) * 1.65);
  const formScore = Math.min(100, 45 + s.PTS * 8 + s.GD * 4 + s.GF * 2);
  return Math.round(rankScore * 0.65 + formScore * 0.35);
}

function loadRankingStorage(){
  try{
    const raw = localStorage.getItem('wc2026_fifa_ranking');
    if(!raw) return;
    const data = JSON.parse(raw);
    Object.keys(data).forEach(k => {
      const code = k.toUpperCase().trim();
      const val = Number(data[k]);
      if(code && Number.isFinite(val)) FIFA_RANKING[code] = val;
    });
  }catch(e){console.warn(e)}
}

function importRanking(){
  try{
    const raw = $('rankingJson').value.trim();
    if(!raw) return toast('Bạn chưa nhập JSON ranking.');
    const data = JSON.parse(raw);
    Object.keys(data).forEach(k => {
      const code = k.toUpperCase().trim();
      const val = Number(data[k]);
      if(code && Number.isFinite(val)) FIFA_RANKING[code] = val;
    });
    localStorage.setItem('wc2026_fifa_ranking', JSON.stringify(FIFA_RANKING));
    render();
    toast('Đã cập nhật FIFA Ranking vào dashboard.');
  }catch(e){
    toast('JSON chưa đúng định dạng. Ví dụ: {"ARG":1,"ESP":2}');
  }
}

function resetRanking(){
  localStorage.removeItem('wc2026_fifa_ranking');
  location.reload();
}

function exportRanking(){
  navigator.clipboard?.writeText(JSON.stringify(FIFA_RANKING,null,2));
  toast('Đã copy bảng FIFA Ranking JSON.');
}

function renderFifaRanking(){
  const q = $('search').value.toLowerCase().trim();
  const group = $('groupFilter').value;
  const ranked = TEAMS
    .filter(t => (!group || t.group === group) && (!q || `${t.name} ${t.code} ${t.group}`.toLowerCase().includes(q)))
    .map(t => ({...t, rank:rankOf(t.code), tier:rankTier(rankOf(t.code)), power:powerIndex(t)}))
    .sort((a,b) => a.rank - b.rank || a.name.localeCompare(b.name));

  const elite = ranked.filter(t => t.rank <= 16).length;
  const topSeedPreview = getQualifiedTeams().topSeeds;
  const strongest = ranked[0];
  const weakest = ranked[ranked.length-1];

  $('ranking').innerHTML = panel('FIFA Ranking & Seed Engine', `
    <div class="rank-toolbar">
      <div style="flex:1;min-width:280px">
        <div class="source-chip">Nguồn tham chiếu: <a href="${RANKING_META.url}" target="_blank">${RANKING_META.source}</a></div>
        <div class="copy-note">Bản nâng cấp cho phép nhập/copy ranking dạng JSON để dashboard không phụ thuộc CORS của website FIFA. Ranking được dùng để tách hạt giống, so sánh sức mạnh và xử lý tie-break khi cần.</div>
      </div>
      <textarea id="rankingJson" placeholder='Dán JSON ranking, ví dụ: {"ARG":1,"ESP":2,"FRA":3,"BRA":5}'></textarea>
      <button class="primary" onclick="importRanking()">Nạp ranking</button>
      <button onclick="exportRanking()">Copy JSON</button>
      <button onclick="resetRanking()">Reset</button>
    </div>
    <div class="premium-grid">
      <div class="premium-card"><div class="label">Đội mạnh nhất theo FIFA rank</div><div class="value">${strongest ? strongest.name : '-'}</div><div class="copy-note">Rank #${strongest ? strongest.rank : '-'}</div></div>
      <div class="premium-card"><div class="label">Nhóm elite top 16</div><div class="value">${elite}</div><div class="copy-note">Đội trong danh sách hiện tại</div></div>
      <div class="premium-card"><div class="label">Ngày ranking tham chiếu</div><div class="value">${RANKING_META.release}</div><div class="copy-note">FIFA công bố kỳ tiếp theo: ${RANKING_META.next}</div></div>
      <div class="premium-card"><div class="label">Đội thấp nhất trong danh sách</div><div class="value">${weakest ? weakest.name : '-'}</div><div class="copy-note">Rank #${weakest ? weakest.rank : '-'}</div></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="center">FIFA rank</th><th>Đội tuyển</th><th class="center">Bảng</th><th>Tier</th><th class="center">Power</th><th>Thanh sức mạnh</th><th>Vai trò knock-out</th>
          </tr>
        </thead>
        <tbody>
          ${ranked.map(t => `
            <tr>
              <td class="center"><b>#${t.rank}</b></td>
              <td>${teamCell(t)}</td>
              <td class="center">${t.group}</td>
              <td><span class="tier ${t.tier.cls}">${t.tier.label}</span></td>
              <td class="center"><b>${t.power}</b></td>
              <td><div class="powerbar"><span style="width:${Math.max(5,Math.min(100,t.power))}%"></span></div></td>
              <td>${topSeedPreview.some(s => s.code === t.code) ? '<span class="badge blue">Seed bảo vệ</span>' : (t.rank <= 16 ? '<span class="badge green">Ứng viên seed</span>' : '<span class="badge yellow">Theo bảng đấu</span>')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `,'Xếp hạng FIFA + chỉ số sức mạnh →');
}

function renderTeams(){
  const groups = {};
  filteredTeams().forEach(t => {
    groups[t.group] ||= [];
    groups[t.group].push(t);
  });

  $('teams').innerHTML = Object.keys(groups).sort().map(g => panel(`Bảng ${g}`, `
    <div class="grid">
      ${groups[g].map(t => {
        const s = teamStats(t.code);
        return `
          <div class="card">
            <img class="logo" src="${t.logo}" onerror="this.style.display='none'">
            <div class="team-name">${t.name}</div>
            <div class="meta">Bảng ${t.group} • ${t.code}</div>
            <div class="stats">
              <div class="stat"><b>${s.P}</b><span>Tr</span></div>
              <div class="stat"><b>${s.W}</b><span>W</span></div>
              <div class="stat"><b>${s.D}</b><span>D</span></div>
              <div class="stat"><b>${s.L}</b><span>L</span></div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `,'')).join('') || `<div class="empty">Không tìm thấy đội phù hợp.</div>`;
}

function renderMatch(m){
  const isLive = m.status === 'in';
  const score = m.status === 'pre' ? 'VS' : `${m.home.score ?? 0} - ${m.away.score ?? 0}`;
  const timeText = isLive ? `${m.displayClock || m.statusText || 'LIVE'}` : (m.completed ? 'FT' : fmtDate(m.date));

  return `
    <div class="match">
      <div class="match-time">
        <div class="${isLive ? 'red' : ''}">${timeText}</div>
        ${isLive ? '<span class="live">LIVE</span>' : ''}
      </div>

      <div class="side">
        <img class="logo" src="${m.home.logo || teamByCode[m.home.code]?.logo || ''}" onerror="this.style.display='none'">
        <div>
          <b>${m.home.name}</b>
          <div class="meta">${m.home.code}</div>
        </div>
      </div>

      <div>
        <div class="score ${isLive ? 'live-score' : ''}">${score}</div>
        <div class="meta" style="text-align:center">${m.group || ''}</div>
      </div>

      <div class="side away">
        <div>
          <b>${m.away.name}</b>
          <div class="meta">${m.away.code}</div>
        </div>
        <img class="logo" src="${m.away.logo || teamByCode[m.away.code]?.logo || ''}" onerror="this.style.display='none'">
      </div>
    </div>
  `;
}

function renderMatchList(id, list, title){
  const ms = filteredMatches(list);
  $(id).innerHTML = panel(title, `
    <div class="match-list">
      ${ms.length ? ms.map(renderMatch).join('') : `<div class="empty">Chưa có dữ liệu phù hợp.</div>`}
    </div>
  `,'');
}

function renderRules(){
  $('rules').innerHTML = panel('Thể thức World Cup 2026', `
    <div class="rule-box">
      <div class="rule-item"><b>1. Điểm số</b><br>Thắng 3 điểm, hòa 1 điểm, thua 0 điểm.</div>
      <div class="rule-item"><b>2. Hiệu số bàn thắng bại</b><br>Nếu bằng điểm, ưu tiên đội có hiệu số tốt hơn.</div>
      <div class="rule-item"><b>3. Tổng số bàn thắng</b><br>Nếu hiệu số bằng nhau, ưu tiên đội ghi nhiều bàn hơn.</div>
      <div class="rule-item"><b>4. Đối đầu trực tiếp</b><br>Khi nhiều đội bằng nhau, xét kết quả đối đầu giữa các đội liên quan.</div>
      <div class="rule-item"><b>5. Fair-play</b><br>Nếu vẫn bằng nhau, xét điểm fair-play dựa trên số thẻ phạt.</div>
      <div class="rule-item"><b>6. Bốc thăm</b><br>Nếu vẫn bằng nhau, FIFA có thể xác định bằng bốc thăm.</div>
      <div class="rule-item"><b>Cách vào vòng 1/32</b><br>12 đội nhất bảng, 12 đội nhì bảng và 8 đội hạng ba tốt nhất sẽ đi tiếp.</div>
      <div class="rule-item"><b>12 đội hạng 3</b><br>Được xếp chung theo điểm, hiệu số, bàn thắng để chọn 8 đội tốt nhất.</div>
      <div class="rule-item"><b>Phân loại đội knock-out</b><br>Nhóm 1 gồm 12 đội nhất bảng; Nhóm 2 gồm 12 đội nhì bảng; Nhóm 3 gồm 8 đội hạng 3 tốt nhất.</div>
      <div class="rule-item"><b>Hạt giống hàng đầu</b><br>4 đội nhất bảng có thứ hạng FIFA cao nhất được tách vào 4 nhánh khác nhau.</div>
      <div class="rule-item"><b>Nguyên tắc ghép cặp</b><br>Mô phỏng gồm cặp nhì bảng liền kề, nhất bảng gặp hạng 3 và các cặp còn lại ưu tiên khác bảng.</div>
      <div class="rule-item"><b>Lưu ý dữ liệu</b><br>Phần chia cặp hiện là mô phỏng theo nguyên tắc cài đặt trong code, có thể thay bằng dữ liệu chính thức khi FIFA công bố.</div>
    </div>
  `,'Xem chi tiết →');
}


function renderOverview(){
  const standings = getGroupStandings();
  const firstGroup = $('groupFilter').value || 'A';
  const groupRows = standings[firstGroup] || standings.A;
  const liveOrNext = matches.filter(m => m.status === 'in' || !m.completed).slice(0,3);

  const topTeams = Object.values(standings).flat().sort(sortStanding).slice(0,5);

  $('overview').innerHTML = `
    <div class="dashboard-grid">
      ${panel(`Bảng ${firstGroup}`, standingsTable(firstGroup, groupRows), 'Xem chi tiết bảng →')}
      ${panel('Trận đấu đang diễn ra / Sắp diễn ra', `
        <div class="match-list">
          ${liveOrNext.length ? liveOrNext.map(renderMatch).join('') : '<div class="empty">Chưa có dữ liệu trận đấu.</div>'}
        </div>
      `,'Xem tất cả →')}
    </div>

    <div class="overview-bottom">
      ${panel('Top đội thi đấu ấn tượng', `
        <div class="impressive">
          ${topTeams.map(t => `
            <div class="mini-card">
              <img src="${t.logo}" onerror="this.style.display='none'">
              <div class="team-name">${t.name}</div>
              <span class="big-points">${t.PTS}</span>
              <div class="meta">Điểm</div>
              <div class="stats">
                <div><b>${t.P}</b><span>Tr</span></div>
                <div><b>${t.W}</b><span>W</span></div>
                <div><b>${t.D}</b><span>D</span></div>
                <div><b>${t.L}</b><span>L</span></div>
              </div>
            </div>
          `).join('')}
        </div>
      `,'Xem tất cả →')}

      ${panel('Thể thức World Cup 2026', `
        <div class="format">
          <ul>
            <li><span class="bullet">👥</span>48 đội chia thành 12 bảng, mỗi bảng 4 đội.</li>
            <li><span class="bullet">✅</span>2 đội đứng đầu mỗi bảng giành quyền vào vòng 1/32.</li>
            <li><span class="bullet">🟠</span>8 đội hạng 3 có thành tích tốt nhất cũng giành quyền đi tiếp.</li>
            <li><span class="bullet">🏆</span>Tổng cộng 32 đội vào vòng loại trực tiếp.</li>
          </ul>
          <div class="map"></div>
        </div>
      `,'Xem chi tiết →')}
    </div>
  `;
}

function render(){
  $('kpiTeams').textContent = TEAMS.length;
  $('kpiMatches').textContent = matches.length || 210;
  $('kpiDone').textContent = matches.filter(m => m.completed).length;
  $('kpiLive').textContent = matches.filter(m => m.status === 'in').length;

  renderOverview();
  renderStandings();
  renderThirdPlaceRanking();
  renderTeams();
  renderFifaRanking();

  const today = new Date().toISOString().slice(0,10);

  renderMatchList('live', matches.filter(m =>
    m.status === 'in' || new Date(m.date).toISOString().slice(0,10) === today
  ), 'Trận đấu đang diễn ra / Hôm nay');

  renderMatchList('schedule', matches.filter(m => !m.completed), 'Lịch thi đấu');
  renderMatchList('history', matches.filter(m => m.completed).reverse(), 'Lịch sử kết quả');

  renderRules();
}

function toast(msg){
  let t = document.getElementById('toast');

  if(!t){
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      background:#071f45;
      color:#fff;
      padding:11px 16px;
      border-radius:999px;
      font-weight:800;
      box-shadow:0 20px 60px rgba(0,0,0,.25);
      z-index:9999;
    `;
    document.body.appendChild(t);
  }

  t.textContent = msg;
  t.style.display = 'block';

  clearTimeout(window.__toast);
  window.__toast = setTimeout(() => t.style.display = 'none', 2300);
}

loadRankingStorage();
initFilters();
render();
refreshAll(true);
setInterval(() => refreshAll(false), 30000);
</script>
</body>
</html>
